<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lara AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:#0b0b0c;
color:white;
}

#chat{
height:calc(100vh - 150px);
overflow-y:auto;
}

.user{
background:#2563eb;
border-radius:20px 20px 0 20px;
}

.ai{
background:#1f2937;
border-radius:20px 20px 20px 0;
}

</style>

</head>

<body class="flex flex-col h-screen">

<header class="flex justify-between items-center p-4 border-b border-gray-700">

<h1 class="text-xl font-bold text-blue-400">
Lara AI
</h1>

<div class="flex gap-3">

<button onclick="startVoice()">🎤</button>
<button onclick="imageInput.click()">🖼</button>
<button onclick="clearChat()">🗑</button>

</div>

</header>

<div id="chat" class="p-5 space-y-4"></div>

<footer class="p-4 border-t border-gray-700 flex gap-2">

<input id="input"
class="flex-1 bg-gray-900 p-3 rounded-xl outline-none"
placeholder="اسأل Lara...">

<button onclick="send()"
class="bg-blue-600 px-6 rounded-xl">
Send
</button>

</footer>

<input type="file" id="imageInput" class="hidden" accept="image/*">

<script>

const API_KEY="AIzaSyA7KrdFXm_R3Up4oiUA7I9WL29ijh-_Wi0"

const MODEL="gemini-1.5-flash-latest"

let imageData=null

const chat=document.getElementById("chat")

let memory=JSON.parse(localStorage.getItem("lara_memory")||"[]")

function saveMemory(){

localStorage.setItem("lara_memory",JSON.stringify(memory))

}

function bubble(role,text,save=true){

const div=document.createElement("div")

div.className=`flex ${role==="user"?"justify-end":"justify-start"}`

div.innerHTML=`
<div class="${role==="user"?"user":"ai"} p-3 max-w-[80%] text-sm">
${text}
</div>
`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

if(save){

memory.push({role,text})

saveMemory()

}

return div.firstChild

}

memory.forEach(m=>bubble(m.role,m.text,false))

function clearChat(){

localStorage.removeItem("lara_memory")
location.reload()

}

imageInput.onchange=function(){

const file=this.files[0]

const reader=new FileReader()

reader.onload=e=>{

imageData=e.target.result

bubble("user","🖼 تم رفع صورة")

}

reader.readAsDataURL(file)

}

function startVoice(){

const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

rec.lang="ar"

rec.start()

rec.onresult=e=>{

document.getElementById("input").value=e.results[0][0].transcript

}

}

function typeWriter(el,text){

let i=0

function type(){

if(i<text.length){

el.innerHTML+=text.charAt(i)

i++

setTimeout(type,10)

}

}

type()

}

async function send(){

const input=document.getElementById("input")

const text=input.value.trim()

if(!text && !imageData) return

bubble("user",text)

input.value=""

const aiBubble=bubble("ai","...")

let prompt=text

try{

const res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[
{text:prompt},
...(imageData?[{
inline_data:{
mime_type:"image/jpeg",
data:imageData.split(",")[1]
}
}]:[])
]
}
]

})

})

const data=await res.json()

const reply=data.candidates?.[0]?.content?.parts?.[0]?.text || "لا يوجد رد"

aiBubble.innerHTML=""

typeWriter(aiBubble,reply)

imageData=null

}catch(e){

aiBubble.innerHTML="❌ خطأ في الاتصال"

}

}

</script>

</body>
</html>
