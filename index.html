<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wimon AI | Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0e0e0f; color: #ffffff; }
        .glass { background: rgba(25, 25, 27, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(121, 153, 255, 0.1); }
        .admin-tag { background: linear-gradient(90deg, #3659ba, #7999ff); padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        #chat-scroller::-webkit-scrollbar { width: 3px; }
        #chat-scroller::-webkit-scrollbar-thumb { background: #3659ba; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <section id="auth-screen" class="fixed inset-0 z-[100] bg-[#0e0e0f] flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold text-center mb-6 text-blue-400">بوابة Wimon الذكية</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="اسم المستخدم" class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 outline-none focus:border-blue-500">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 outline-none focus:border-blue-500">
                <button onclick="handleAuth()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition-all">دخول النظام</button>
                <p class="text-[10px] text-gray-500 text-center uppercase tracking-widest">Protocol Alpha Identity Check</p>
            </div>
        </div>
    </section>

    <main id="main-ui" class="hidden flex flex-col h-full">
        <header class="h-16 glass flex items-center justify-between px-6 border-b border-white/5">
            <div class="flex items-center gap-3">
                <div id="role-indicator" class="admin-tag hidden">ADMIN</div>
                <span class="font-bold text-blue-400" id="display-name">Wimon AI</span>
            </div>
            <button onclick="location.reload()" class="text-gray-400 hover:text-red-500 transition-colors">تسجيل خروج</button>
        </header>

        <div id="chat-scroller" class="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
            <div class="bg-[#19191b] border border-white/5 p-4 rounded-xl text-sm leading-relaxed" id="welcome-msg">
                جاري تهيئة الاتصال...
            </div>
        </div>

        <footer class="fixed bottom-0 w-full p-4 bg-gradient-to-t from-[#0e0e0f] to-transparent">
            <div class="max-w-4xl mx-auto glass rounded-2xl flex items-center p-2 gap-2 shadow-2xl">
                <button onclick="document.getElementById('file-input').click()" class="p-2 text-gray-400 hover:text-blue-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg></button>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(this)">
                <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-3">
                <button id="send-btn" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-700 transition-all">
                    <svg class="w-5 h-5 text-white transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
        </footer>
    </main>

    <script>
        const API_KEY = "AIzaSyA7KrdFXm_R3Up4oiUA7I9WL29ijh-_Wi0"; 
        let currentUser = null;
        let selectedImage = null;

        // نظام التحقق
        function handleAuth() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            if(!user || !pass) return alert("يرجى إدخال البيانات");

            currentUser = { name: user, role: (user.toLowerCase() === 'kareem' && pass === '123') ? 'admin' : 'user' };
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').classList.remove('hidden');
            
            if(currentUser.role === 'admin') {
                document.getElementById('role-indicator').classList.remove('hidden');
                document.getElementById('display-name').innerText = "لوحة التحكم | كريم";
            }
            
            document.getElementById('welcome-msg').innerHTML = `مرحباً بك يا <b>${currentUser.name}</b>. نظام ${currentUser.role === 'admin' ? 'الأدمن' : 'المستخدم'} نشط الآن.`;
        }

        async function handleImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => selectedImage = e.target.result.split(',')[1];
            reader.readAsDataURL(file);
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if(!prompt && !selectedImage) return;

            addBubble('user', prompt);
            input.value = '';
            
            const aiBubble = addBubble('ai', 'جاري التفكير...');

            try {
                const parts = [{ text: prompt || "حلل هذه الصورة" }];
                if(selectedImage) parts.push({ inline_data: { mime_type: "image/jpeg", data: selectedImage } });

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                const text = data.candidates[0].content.parts[0].text;
                aiBubble.innerText = text;
                selectedImage = null;
            } catch (err) {
                aiBubble.innerText = "حدث خطأ: تأكد من الـ API Key واتصالك بالإنترنت.";
                console.error(err);
            }
        }

        function addBubble(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full`;
            div.innerHTML = `<div class="${role === 'user' ? 'bg-blue-600' : 'bg-[#19191b] border border-white/5'} p-3 rounded-xl max-w-[85%] text-sm">${text}</div>`;
            document.getElementById('chat-scroller').appendChild(div);
            document.getElementById('chat-scroller').scrollTop = document.getElementById('chat-scroller').scrollHeight;
            return div.lastChild;
        }

        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
