<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wimon AI | Kareem Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0e0e0f; color: #ffffff; overflow: hidden; height: 100dvh; }
        .glass { background: rgba(25, 25, 27, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .user-msg { background: linear-gradient(135deg, #3659ba, #25408f); border-radius: 18px 18px 0 18px; }
        .ai-msg { background: #1c1c1e; border-radius: 18px 18px 18px 0; border: 1px solid #2c2c2e; }
        #chat-scroller { height: calc(100dvh - 140px); overflow-y: auto; padding-bottom: 20px; }
        .typing::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col">

    <section id="auth-screen" class="fixed inset-0 z-[100] bg-[#0e0e0f] flex items-center justify-center p-6 transition-all duration-500">
        <div class="glass w-full max-w-sm p-10 rounded-[2.5rem] text-center shadow-2xl border-blue-500/20">
            <div class="mb-6 text-blue-500 inline-block p-4 rounded-full bg-blue-500/10 border border-blue-500/20">
                <span class="material-symbols-outlined text-6xl">account_circle</span>
            </div>
            <h1 class="text-2xl font-bold mb-1">أهلاً، Kareem</h1>
            <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-[0.2em]">بروتوكول الوصول الخاص</p>
            
            <input type="password" id="admin-pass" placeholder="كلمة المرور..." class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-center focus:border-blue-500 outline-none mb-4 transition-all focus:ring-1 focus:ring-blue-500">
            <button onclick="checkAdmin()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/20">فتح المحطة</button>
        </div>
    </section>

    <main id="main-ui" class="hidden flex flex-col h-full opacity-0 transition-opacity duration-700">
        <header class="h-16 glass flex items-center justify-between px-6 border-b border-white/5 z-50">
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <span class="font-bold text-blue-400 tracking-tighter">WIMON NEXUS</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Kareem Admin</span>
                <button onclick="location.reload()" class="material-symbols-outlined text-red-400/70 hover:text-red-400 transition-colors">power_settings_new</button>
            </div>
        </header>

        <div id="chat-scroller" class="p-4 space-y-6 custom-scrollbar">
            <div class="ai-msg p-5 max-w-[85%] text-sm leading-relaxed shadow-xl">
                مرحباً بك يا <strong>Kareem</strong>. تم التعرف على البصمة الرقمية. المحطة العصبية تحت تصرفك الآن.
            </div>
        </div>

        <footer class="p-4 bg-[#0e0e0f]/90 backdrop-blur-xl">
            <div class="max-w-4xl mx-auto flex items-center gap-2 glass rounded-[2rem] p-2 pr-4 border-white/10 shadow-2xl">
                <button onclick="document.getElementById('file-input').click()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-blue-400 transition-colors"><span class="material-symbols-outlined">add_photo_alternate</span></button>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(this)">
                
                <textarea id="user-input" rows="1" placeholder="أمر عصبي مباشر..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 text-sm resize-none" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
                
                <button onclick="sendToAI()" class="w-12 h-12 bg-blue-600 rounded-[1.2rem] flex items-center justify-center text-white shadow-lg shadow-blue-600/30 active:scale-90 transition-all">
                    <span class="material-symbols-outlined font-bold">arrow_upward</span>
                </button>
            </div>
        </footer>
    </main>

    <script>
        // الإعدادات الخاصة بك
        const API_KEY = "AIzaSyA7KrdFXm_R3Up4oiUA7I9WL29ijh-_Wi0"; // API الخاص بك هنا
        const ADMIN_NAME = "Kareem";
        const ADMIN_PASS = "Kareem112233@"; // كلمة المرور المطلوبة
        let base64Image = null;

        function checkAdmin() {
            const input = document.getElementById('admin-pass').value;
            if(input === ADMIN_PASS) {
                const screen = document.getElementById('auth-screen');
                screen.style.opacity = '0';
                screen.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    screen.classList.add('hidden');
                    const main = document.getElementById('main-ui');
                    main.classList.remove('hidden');
                    setTimeout(() => main.style.opacity = '1', 50);
                }, 500);
            } else {
                alert("رمز الوصول غير صحيح! غير مصرح لك يا صديقي.");
            }
        }

        function previewImage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                alert("تم تحميل الصورة بنجاح (جاهزة للتحليل)");
            };
            reader.readAsDataURL(file);
        }

        async function sendToAI() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text && !base64Image) return;

            addBubble('user', text + (base64Image ? " [تحليل صورة]" : ""));
            input.value = '';
            input.style.height = 'auto';
            
            const loading = addBubble('ai', '<span class="typing">جاري المعالجة</span>');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `User is Admin Kareem. Always respond with high-level intelligence. Message: ${text || "Analyze this image"}` },
                                ...(base64Image ? [{ inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }] : [])
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const aiMsg = data.candidates[0].content.parts[0].text;
                loading.innerHTML = "";
                typeWriter(loading, aiMsg);
                base64Image = null;
            } catch (err) {
                loading.innerHTML = `<span class="text-red-400">خطأ في السيرفر: ${err.message}</span>`;
            }
        }

        function addBubble(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full animate-in fade-in slide-in-from-bottom-2 duration-300`;
            div.innerHTML = `<div class="${role === 'user' ? 'user-msg' : 'ai-msg'} p-4 max-w-[88%] text-sm shadow-2xl">${content}</div>`;
            const scroller = document.getElementById('chat-scroller');
            scroller.appendChild(div);
            scroller.scrollTop = scroller.scrollHeight;
            return div.firstChild;
        }

        function typeWriter(element, text) {
            let i = 0;
            const speed = 15;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    document.getElementById('chat-scroller').scrollTop = document.getElementById('chat-scroller').scrollHeight;
                }
            }
            type();
        }

        // Enter Key Listener
        document.getElementById('admin-pass').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAdmin(); });
    </script>
</body>
</html>
