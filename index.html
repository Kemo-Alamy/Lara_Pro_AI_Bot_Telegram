<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wimon AI | بروتوكول ألفا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0e0e0f; color: #ffffff; overflow: hidden; height: 100dvh; }
        .glass { background: rgba(25, 25, 27, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(121, 153, 255, 0.15); }
        .user-msg { background: linear-gradient(135deg, #3659ba, #25408f); border-radius: 18px 18px 0 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .ai-msg { background: #19191b; border-radius: 18px 18px 18px 0; border: 1px solid #262627; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3659ba; border-radius: 10px; }
        #chat-scroller { height: calc(100dvh - 140px); padding-bottom: 100px; }
        @keyframes pulse-ring { 0% { transform: scale(.33); } 80%, 100% { opacity: 0; } }
        .status-online { position: relative; }
        .status-online::before { content: ''; position: absolute; width: 100%; height: 100%; background: #22c55e; border-radius: 50%; animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
    </style>
</head>
<body class="flex flex-col">

    <section id="auth-screen" class="fixed inset-0 z-[100] bg-[#0e0e0f] flex items-center justify-center p-4">
        <div class="glass w-full max-w-sm p-8 rounded-3xl text-center shadow-2xl border-blue-500/20">
            <div class="w-20 h-20 bg-blue-600/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-blue-500/30">
                <span class="material-symbols-outlined text-4xl text-blue-400">lock_open</span>
            </div>
            <h1 id="auth-title" class="text-2xl font-bold mb-2">تسجيل الدخول</h1>
            <p id="auth-subtitle" class="text-gray-400 text-xs mb-8 uppercase tracking-widest">بروتوكول الوصول المشفر</p>
            
            <div class="space-y-4">
                <input type="text" id="username" placeholder="اسم المستخدم" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-center focus:border-blue-500 outline-none transition-all">
                <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-center focus:border-blue-500 outline-none transition-all">
                <button onclick="handleAuth()" id="auth-submit" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold shadow-lg shadow-blue-600/20 active:scale-95 transition-all">تفعيل الدخول</button>
            </div>
            
            <button onclick="toggleAuth()" id="auth-toggle" class="mt-6 text-sm text-blue-400 hover:underline">ليس لديك حساب؟ أنشئ واحداً الآن</button>
        </div>
    </section>

    <main id="main-ui" class="hidden flex flex-col h-full opacity-0 transition-opacity duration-500">
        <header class="h-16 glass flex items-center justify-between px-6 z-50">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full status-online"></div>
                <span class="font-bold text-blue-400 tracking-tight">WIMON NEXUS</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="display-user" class="text-xs text-gray-400 font-bold"></span>
                <button onclick="location.reload()" class="material-symbols-outlined text-red-400 text-xl">power_settings_new</button>
            </div>
        </header>

        <div id="chat-scroller" class="overflow-y-auto p-4 space-y-6 custom-scrollbar flex-1">
            <div class="ai-msg p-4 max-w-[85%] text-sm leading-relaxed shadow-sm">
                مرحباً بك في المنطقة الآمنة. تم استعادة جميع الشظايا العصبية. أنا جاهز للتحليل المتقدم.
            </div>
        </div>

        <div id="img-preview-container" class="hidden fixed bottom-28 right-6 p-2 glass rounded-2xl border-blue-500/50 border animate-bounce">
            <img id="image-tag" src="" class="w-20 h-20 object-cover rounded-xl shadow-2xl">
            <button onclick="removeImage()" class="absolute -top-2 -left-2 bg-red-500 w-6 h-6 rounded-full text-white text-[10px] flex items-center justify-center shadow-lg">✕</button>
        </div>

        <footer class="p-4 bg-[#0e0e0f]/80 backdrop-blur-md">
            <div class="max-w-4xl mx-auto flex items-center gap-2 glass rounded-3xl p-2 pr-4 shadow-2xl border-white/5">
                <button onclick="document.getElementById('file-input').click()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-blue-400">
                    <span class="material-symbols-outlined">image</span>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImage(this)">
                
                <textarea id="user-input" rows="1" placeholder="اكتب أمراً..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 text-sm resize-none max-h-32" oninput="autoResize(this)"></textarea>
                
                <button id="mic-btn" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-red-400">
                    <span class="material-symbols-outlined">mic</span>
                </button>
                <button onclick="sendToAI()" id="send-btn" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-blue-600/30 active:scale-90 transition-all">
                    <span class="material-symbols-outlined font-bold">arrow_upward</span>
                </button>
            </div>
        </footer>
    </main>

    <script>
        // الإعدادات الأساسية
        const API_KEY = "AIzaSyA7KrdFXm_R3Up4oiUA7I9WL29ijh-_Wi0"; 
        let isLogin = true;
        let base64Image = null;

        // --- نظام الـ Auth (IndexedDB) ---
        const dbPromise = new Promise((resolve) => {
            const request = indexedDB.open("WimonStorage", 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                db.createObjectStore("users", { keyPath: "username" });
            };
            request.onsuccess = (e) => resolve(e.target.result);
        });

        async function handleAuth() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            if(!u || !p) return alert("أكمل البيانات!");

            const db = await dbPromise;
            const tx = db.transaction("users", "readwrite");
            const store = tx.objectStore("users");

            if(isLogin) {
                const req = store.get(u);
                req.onsuccess = () => {
                    if(req.result && req.result.password === p) {
                        launchUI(u);
                    } else { alert("خطأ في بيانات الوصول!"); }
                };
            } else {
                store.put({ username: u, password: p });
                alert("تم إنشاء الهوية. سجل دخولك الآن.");
                toggleAuth();
            }
        }

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "تسجيل الدخول" : "إنشاء هوية جديدة";
            document.getElementById('auth-submit').innerText = isLogin ? "تفعيل الدخول" : "تسجيل الهوية";
            document.getElementById('auth-toggle').innerText = isLogin ? "ليس لديك حساب؟ أنشئ واحداً" : "لديك حساب؟ سجل دخولك";
        }

        function launchUI(user) {
            document.getElementById('auth-screen').style.display = 'none';
            const main = document.getElementById('main-ui');
            main.classList.remove('hidden');
            setTimeout(() => main.style.opacity = '1', 10);
            document.getElementById('display-user').innerText = `أدمن: ${user}`;
        }

        // --- منطق الـ AI ---
        function handleImage(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('image-tag').src = base64Image;
                document.getElementById('img-preview-container').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function removeImage() { base64Image = null; document.getElementById('img-preview-container').classList.add('hidden'); }

        async function sendToAI() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text && !base64Image) return;

            addBubble('user', text);
            input.value = '';
            input.style.height = 'auto';
            const loading = addBubble('ai', 'جاري التفكير...');
            removeImage();

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: text || "حلل الصورة المرفقة" },
                                ...(base64Image ? [{ inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }] : [])
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const aiMsg = data.candidates[0].content.parts[0].text;
                loading.innerText = '';
                typeWriter(loading, aiMsg);
                speak(aiMsg);
            } catch (err) {
                loading.innerText = `خطأ في البروتوكول: ${err.message}`;
            }
        }

        function addBubble(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full animate-in fade-in duration-300`;
            div.innerHTML = `<div class="${role === 'user' ? 'user-msg' : 'ai-msg'} p-4 max-w-[85%] text-sm shadow-xl">${content}</div>`;
            const scroller = document.getElementById('chat-scroller');
            scroller.appendChild(div);
            scroller.scrollTop = scroller.scrollHeight;
            return div.firstChild;
        }

        function typeWriter(element, text) {
            let i = 0;
            const speed = 20;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                    document.getElementById('chat-scroller').scrollTop = document.getElementById('chat-scroller').scrollHeight;
                }
            }
            type();
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            synth.speak(utter);
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        // تسجيل الدخول بالـ Enter
        document.getElementById('password').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleAuth(); });
        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendToAI(); } });
    </script>
</body>
</html>
