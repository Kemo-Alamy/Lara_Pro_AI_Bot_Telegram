<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wimon AI | المساعد الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0e0e0f; color: #ffffff; overflow: hidden; }
        .glass { background: rgba(25, 25, 27, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(121, 153, 255, 0.1); }
        .chat-container { height: calc(100dvh - 160px); }
        .user-msg { background: #3659ba; border-radius: 15px 15px 0 15px; }
        .ai-msg { background: #19191b; border-radius: 15px 15px 15px 0; border: 1px solid #262627; }
        /* Typing animation */
        .dots span { animation: blink 1.4s infinite; opacity: 0; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <section id="login-screen" class="fixed inset-0 z-[100] bg-[#0e0e0f] flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-8 rounded-2xl text-center shadow-2xl">
            <span class="material-symbols-outlined text-6xl text-blue-400 mb-4">shield_person</span>
            <h1 class="text-2xl font-bold mb-6">نظام الوصول الآمن</h1>
            <input type="password" id="auth-key" placeholder="أدخل رمز الدخول..." class="w-full bg-black/40 border border-gray-700 rounded-lg p-3 mb-4 text-center focus:border-blue-500 outline-none">
            <button onclick="startSystem()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition-all">تفعيل البروتوكول</button>
        </div>
    </section>

    <main id="main-ui" class="hidden flex flex-col h-full">
        <header class="h-16 glass flex items-center justify-between px-6 border-b border-white/5">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="font-bold tracking-tighter text-blue-400 uppercase">Wimon Nexus v3</span>
            </div>
            <button onclick="location.reload()" class="material-symbols-outlined text-gray-400">logout</button>
        </header>

        <div id="chat-scroller" class="chat-container overflow-y-auto p-4 space-y-6 custom-scrollbar">
            <div class="ai-msg p-4 max-w-[90%] md:max-w-[70%] text-sm leading-relaxed">
                مرحباً بك يا <strong>أدمن كريم</strong>. تم تفعيل بروتوكول ألفا. أنا جاهز لمعالجة الصور، الصوت، والنصوص بذاكرة كاملة.
            </div>
        </div>

        <div id="img-preview-box" class="hidden fixed bottom-24 right-6 p-2 glass rounded-lg border-blue-500/50 border">
            <img id="preview-tag" src="" class="w-16 h-16 object-cover rounded">
            <button onclick="closeImg()" class="absolute -top-2 -left-2 bg-red-500 rounded-full p-1 text-[10px]">X</button>
        </div>

        <footer class="fixed bottom-0 w-full p-4 bg-[#0e0e0f]">
            <div class="max-w-4xl mx-auto flex items-end gap-2 glass rounded-2xl p-2 px-4 shadow-xl">
                <button onclick="document.getElementById('file-input').click()" class="p-2 text-gray-400 hover:text-blue-400">
                    <span class="material-symbols-outlined">add_circle</span>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImg(this)">
                
                <textarea id="user-input" rows="1" placeholder="أمر عصبي مباشر..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 text-sm resize-none" oninput="this.style.height='';this.style.height=this.scrollHeight+'px'"></textarea>
                
                <button id="mic-btn" class="p-2 text-gray-400 hover:text-red-400 transition-colors">
                    <span class="material-symbols-outlined">mic</span>
                </button>
                <button id="send-btn" class="bg-blue-600 p-2 rounded-xl hover:scale-105 active:scale-95 transition-all shadow-lg shadow-blue-500/20">
                    <span class="material-symbols-outlined text-white">send</span>
                </button>
            </div>
        </footer>
    </main>

    <script>
        // --- الإعدادات ---
        const API_KEY = "AIzaSyA7KrdFXm_R3Up4oiUA7I9WL29ijh-_Wi0"; 
        let chatHistory = [];
        let base64Image = null;

        // 1. الدخول
        function startSystem() {
            const key = document.getElementById('auth-key').value;
            if(key.length >= 4) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').classList.remove('hidden');
            } else { alert("خطأ في المفتاح!"); }
        }

        // 2. معاينة الصور
        function previewImg(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('preview-tag').src = base64Image;
                document.getElementById('img-preview-box').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }
        function closeImg() { base64Image = null; document.getElementById('img-preview-box').classList.add('hidden'); }

        // 3. الإرسال لـ Gemini
        async function askAI() {
            const text = document.getElementById('user-input').value.trim();
            if(!text && !base64Image) return;

            addBubble('user', text);
            document.getElementById('user-input').value = '';
            
            const loading = addBubble('ai', '<div class="dots">جاري المعالجة<span>.</span><span>.</span><span>.</span></div>');

            try {
                const payload = {
                    contents: [{
                        parts: [
                            { text: text || "حلل هذه الصورة" },
                            ...(base64Image ? [{ inline_data: { mime_type: "image/jpeg", data: base64Image.split(',')[1] } }] : [])
                        ]
                    }]
                };

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                const responseText = data.candidates[0].content.parts[0].text;
                
                loading.innerHTML = responseText;
                speak(responseText);
                closeImg();
            } catch (e) { loading.innerHTML = "خطأ في الاتصال بالسيرفر."; }
        }

        // 4. وظائف مساعدة
        function addBubble(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full`;
            div.innerHTML = `<div class="${role === 'user' ? 'user-msg' : 'ai-msg'} p-4 max-w-[85%] text-sm">${content}</div>`;
            const scroller = document.getElementById('chat-scroller');
            scroller.appendChild(div);
            scroller.scrollTop = scroller.scrollHeight;
            return div.firstChild;
        }

        // 5. الصوت (النطق)
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'ar-SA';
            synth.speak(utter);
        }

        // 6. المايك (التعرف على الكلام)
        const micBtn = document.getElementById('mic-btn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            micBtn.onclick = () => { recognition.start(); micBtn.classList.add('text-red-500'); };
            recognition.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                micBtn.classList.remove('text-red-500');
            };
        }

        document.getElementById('send-btn').onclick = askAI;
    </script>
</body>
</html>
