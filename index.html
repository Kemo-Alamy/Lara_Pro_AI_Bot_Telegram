<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Lara AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.26/mammoth.browser.min.js"></script>

<style>

body{
font-family:'Cairo',sans-serif;
background:#0e0e0f;
color:white;
height:100vh;
overflow:hidden;
}

#chat{
height:calc(100vh - 120px);
overflow-y:auto;
padding:20px;
}

.user{
background:#3659ba;
border-radius:18px 18px 0 18px;
}

.ai{
background:#1c1c1e;
border-radius:18px 18px 18px 0;
border:1px solid #2c2c2e;
}

</style>

</head>

<body class="flex flex-col">

<header class="flex justify-between items-center px-6 h-14 border-b border-gray-700">

<div class="font-bold text-blue-400">
Lara AI
</div>

<div class="flex gap-3">

<button onclick="toggleTheme()">🌙</button>
<button onclick="clearChat()">🗑</button>

</div>

</header>

<div id="chat"></div>

<footer class="p-3 border-t border-gray-700">

<div class="flex gap-2">

<input type="file" id="fileInput" class="hidden" onchange="handleFile(this)">

<button onclick="fileInput.click()">📂</button>

<button onclick="startVoice()">🎤</button>

<textarea id="input" class="flex-1 bg-transparent outline-none resize-none"
placeholder="اكتب رسالة لـ Lara..."></textarea>

<button onclick="send()">➤</button>

</div>

</footer>

<script>

const API_KEY="AIzaSyA7KrdFXm_R3Up4oiUA7I9WL29ijh-_Wi0"

const MODEL="gemini-1.5-flash-latest"

let history=JSON.parse(localStorage.getItem("lara_memory")||"[]")

let fileContent=null
let imageData=null

function saveMemory(){

localStorage.setItem("lara_memory",JSON.stringify(history))

}

function clearChat(){

localStorage.removeItem("lara_memory")
location.reload()

}

function addBubble(role,text,save=true){

const chat=document.getElementById("chat")

const div=document.createElement("div")

div.className=`flex ${role=="user"?"justify-end":"justify-start"} mb-4`

div.innerHTML=`
<div class="${role=="user"?"user":"ai"} p-3 max-w-xs text-sm">
${text}
</div>
`

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

if(save){

history.push({role,text})
saveMemory()

}

return div.firstChild

}

function toggleTheme(){

document.body.classList.toggle("bg-white")
document.body.classList.toggle("text-black")

}

function startVoice(){

const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

rec.lang="ar"

rec.start()

rec.onresult=e=>{
document.getElementById("input").value=e.results[0][0].transcript
}

}

function speak(text){

const speech=new SpeechSynthesisUtterance(text)

speech.lang="ar"

speech.rate=1

speechSynthesis.speak(speech)

}

async function handleFile(input){

const file=input.files[0]

if(file.type.includes("image")){

const reader=new FileReader()

reader.onload=e=>{
imageData=e.target.result
addBubble("user","🖼 تم رفع صورة")
}

reader.readAsDataURL(file)

}

else if(file.type=="application/pdf"){

const reader=new FileReader()

reader.onload=async function(){

const pdf=await pdfjsLib.getDocument(reader.result).promise

let text=""

for(let i=1;i<=pdf.numPages;i++){

const page=await pdf.getPage(i)

const content=await page.getTextContent()

text+=content.items.map(s=>s.str).join(" ")

}

fileContent=text

addBubble("user","📄 تم قراءة PDF")

}

reader.readAsArrayBuffer(file)

}

else if(file.name.endsWith(".docx")){

const reader=new FileReader()

reader.onload=function(){

mammoth.extractRawText({arrayBuffer:reader.result})
.then(result=>{

fileContent=result.value

addBubble("user","📄 تم قراءة DOCX")

})

}

reader.readAsArrayBuffer(file)

}

}

async function send(){

const input=document.getElementById("input")

const text=input.value.trim()

if(!text && !fileContent && !imageData)return

addBubble("user",text)

input.value=""

const aiBubble=addBubble("ai","...")

let prompt=text

if(fileContent){

prompt+="\n\nحلل هذا الملف:\n"+fileContent.slice(0,12000)

}

try{

const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`,{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

contents:[{

parts:[

{text:prompt},

...(imageData?[{

inline_data:{
mime_type:"image/jpeg",
data:imageData.split(",")[1]
}

}]:[])

]

}]

})

})

const data=await res.json()

const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||"لا يوجد رد"

aiBubble.innerHTML=""

stream(aiBubble,reply)

speak(reply)

fileContent=null
imageData=null

}catch(e){

aiBubble.innerHTML="خطأ اتصال"

}

}

function stream(el,text){

let i=0

function type(){

if(i<text.length){

el.innerHTML+=text.charAt(i)

i++

setTimeout(type,10)

}

}

type()

}

history.forEach(m=>addBubble(m.role,m.text,false))

</script>

</body>
</html>
