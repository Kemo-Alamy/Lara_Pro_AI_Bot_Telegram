<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wimon AI | Kareem PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0e0e0f; color: #ffffff; overflow: hidden; height: 100dvh; }
        .glass { background: rgba(25, 25, 27, 0.98); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .user-msg { background: #3659ba; border-radius: 18px 18px 0 18px; }
        .ai-msg { background: #1c1c1e; border-radius: 18px 18px 18px 0; border: 1px solid #2c2c2e; }
        #chat-scroller { height: calc(100dvh - 140px); overflow-y: auto; padding: 20px; }
    </style>
</head>
<body class="flex flex-col">

    <section id="auth-screen" class="fixed inset-0 z-[100] bg-[#0e0e0f] flex items-center justify-center p-6 text-center">
        <div class="glass w-full max-w-sm p-10 rounded-[2.5rem] border-blue-500/20 shadow-2xl">
            <h1 class="text-2xl font-bold mb-6">محطة Kareem</h1>
            <input type="text" id="admin-name" placeholder="الاسم (Kareem)" class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 mb-3 outline-none focus:border-blue-500 text-center">
            <input type="password" id="admin-pass" placeholder="الباسورد" class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 mb-3 outline-none focus:border-blue-500 text-center">
            <input type="password" id="api-key-input" placeholder="حط الـ API Key الجديد هنا" class="w-full bg-black/50 border border-blue-500/40 rounded-2xl p-4 mb-6 outline-none focus:border-blue-500 text-center text-sm">
            <button onclick="checkAdmin()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-blue-600/30">دخول آمن</button>
            <p class="text-[10px] text-gray-500 mt-4 leading-relaxed">المفتاح سيُحفظ في متصفحك فقط ولن يُرفع على الإنترنت أبداً.</p>
        </div>
    </section>

    <main id="main-ui" class="hidden flex flex-col h-full opacity-0 transition-opacity duration-500">
        <header class="h-16 glass flex items-center justify-between px-6 border-b border-white/10">
            <span class="font-bold text-blue-400">WIMON NEXUS</span>
            <button onclick="logout()" class="material-symbols-outlined text-red-500">logout</button>
        </header>
        <div id="chat-scroller" class="flex-1 space-y-6">
            <div class="ai-msg p-4 max-w-[85%] text-sm">أهلاً يا Kareem. تم تفعيل البروتوكول. المفتاح الآن في أمان تام بعيداً عن الروبوتات.</div>
        </div>
        <footer class="p-4 bg-[#0e0e0f]">
            <div class="max-w-4xl mx-auto flex items-center gap-2 glass rounded-[2rem] p-2 pr-4 shadow-2xl border-white/10">
                <textarea id="user-input" rows="1" placeholder="أمر مباشر..." class="flex-1 bg-transparent border-none focus:ring-0 py-3 text-sm resize-none"></textarea>
                <button onclick="sendToAI()" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg active:scale-90 transition-all"><span class="material-symbols-outlined">send</span></button>
            </div>
        </footer>
    </main>

    <script>
        const MASTER_NAME = "Kareem";
        const MASTER_PASS = "Kareem112233@";

        // استرجاع المفتاح لو موجود
        if(localStorage.getItem('MY_SAFE_KEY')) {
            document.getElementById('api-key-input').value = localStorage.getItem('MY_SAFE_KEY');
        }

        function checkAdmin() {
            const u = document.getElementById('admin-name').value.trim();
            const p = document.getElementById('admin-pass').value.trim();
            const key = document.getElementById('api-key-input').value.trim();

            if(u === MASTER_NAME && p === MASTER_PASS && key) {
                localStorage.setItem('MY_SAFE_KEY', key); // بيتحفظ في جهازك بس
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-ui').classList.remove('hidden');
                setTimeout(() => document.getElementById('main-ui').style.opacity = '1', 50);
            } else { alert("تأكد من الاسم، الباسورد، ووضع المفتاح الجديد!"); }
        }

        async function sendToAI() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            addBubble('user', text);
            input.value = '';
            const loading = addBubble('ai', 'جاري التفكير...');

            const key = localStorage.getItem('MY_SAFE_KEY');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                loading.innerText = data.candidates[0].content.parts[0].text;
            } catch (err) { loading.innerText = "⚠️ خطأ: المفتاح قد يكون غير صحيح أو منتهي."; }
        }

        function addBubble(role, content) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full`;
            div.innerHTML = `<div class="${role === 'user' ? 'user-msg' : 'ai-msg'} p-4 max-w-[85%] text-sm shadow-xl">${content}</div>`;
            document.getElementById('chat-scroller').appendChild(div);
            document.getElementById('chat-scroller').scrollTop = document.getElementById('chat-scroller').scrollHeight;
            return div.firstChild;
        }

        function logout() { localStorage.removeItem('MY_SAFE_KEY'); location.reload(); }
    </script>
</body>
</html>
